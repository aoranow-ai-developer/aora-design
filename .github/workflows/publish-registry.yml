name: Publish registry

# Em cada push na main: gera os JSON do registry (shadcn build) e publica no
# GitHub Pages → https://aoranow-ai-developer.github.io/aora-design/r/{name}.json
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# uma publicação por vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # gera os itens em ./_site/r → servidos em /r/{name}.json
      - run: npx --yes shadcn@latest build --output ./_site/r
      - uses: actions/configure-pages@v5
        with:
          enablement: true # liga o Pages (source = Actions) na 1ª run
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
